<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Personlige Hjemmeside</title>
    <style>
        /* Nulstil margener og padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
        }
        body {
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        header, main, footer {
            width: 100%;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff; /* Hvid baggrund */
            color: #333; /* Sort tekstfarve */
            padding: 10px 20px;
            z-index: 1; /* Sørg for, at headeren er ovenpå billedet */
            position: fixed; /* Fiksér headeren */
            top: 0;
            left: 0;
        }
        .left-content h1 {
            margin: 0;
            font-size: 1.5em;
        }
        nav a {
            color: #333; /* Sort tekstfarve */
            margin: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .image-box {
            position: relative;
            width: 100%;
            height: 100vh; /* Sæt højden til hele viewporten */
            margin: 0; /* Fjern margin */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .image-box img {
            width: 100%;
            height: 100%; /* Sørg for, at billedet fylder hele boksen */
            object-fit: cover; /* Sørg for, at billedet dækker hele området uden at forvrænge */
        }
        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Mørk overlay med 50% gennemsigtighed */
        }
        .image-box .text-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgb(255, 255, 255);
            z-index: 2; /* Sørg for, at teksten er foran overlay */
        }
        .content {
            width: 100%;
            padding: 20px;
            align-items: center;
            background-color: #353535; /* Lysegrå baggrund */
            color: #dad8d8;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center; /* Centrer teksten */
        }
        .about-image {
            width: 15%; /* Bredde til billedet */
            padding-right: 5px; /* Mellemrum mellem billede og tekst */
        }
        .about-image img {
            width: 75%; /* Sørg for, at billedet fylder hele boksen */
            height: auto;
            border-radius: 10%
        }
        .about-text {
            width: 100%; /* Bredde til teksten */
            align-items: left;
        }
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #272727; /* Sort baggrund */
            color: #fff; /* Hvid tekstfarve */
            padding: 10px 20px;
        }
        .social-icons {
            display: flex;
        }
        .social-icons a {
            color: #fff; /* Hvid tekstfarve */
            margin: 0 10px;
            text-decoration: none;
        }
        .social-icons a:hover {
            color: lightgray;
        }
        .social-icons svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        .left-align {
            text-align: left;
        }

    </style>
</head>
<body>
    <header>
        <div class="left-content">
            <h1>Ruben Kronborg</h1>
        </div>
        <nav>
            <a href="#home">Hjem</a>
            <a href="#about">Om</a>
            <a href="#projects">Projekter</a>
        </nav>
    </header>
    <main>
        <div id="home" class="image-box">
            <img src="assets/blå.jpeg" alt="Description of image">
            <div class="image-overlay"></div> <!-- Overlay til at gøre billedet mørkere -->
            <div class="text-overlay"><font size="+3"><b>Portfolio af Ruben Kronborg Jensen</b></font></div>
        </div>
        <div id="about" class="content">
            <div class="about-image">
                <img src="assets\website.png" alt="Dit billede">
            </div>
            <div class="about-text">
                <h2 class="left-align"><b>About me</b></h2>
                <p class="Left-align">Replaced asdadas.</p>
            </div>
        </div>
    </main>
    <footer>
        <div>&copy; 2024 Ruben Kronborg</div>
        <div class="social-icons">
            <!-- LinkedIn-logo -->
            <a href="https://www.linkedin.com/in/ruben-jensen-8655011b4/" target="_blank" aria-label="LinkedIn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">

                </svg>
            </a>
            <!-- GitHub-logo -->
            <a href="https://github.com/Rubenk44/" target="_blank" aria-label="GitHub">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path fill="none" d="M0 0h24v24H0z"/>

            </a>
        </div>
    </footer>
    <script>
        function scrollToNextSection() {
            const nextSection = document.querySelector('#about');
            nextSection.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
