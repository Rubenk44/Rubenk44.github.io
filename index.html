<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Personlige Hjemmeside</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            color: white;
            padding: 10px 20px;
        }
        .left-content h1 {
            margin: 0;
            font-size: 1.5em;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            flex: 1;
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: gray;
            text-align: center;
            padding: 20px;
        }
        .social-icons {
            margin-top: 10px;
        }
        .social-icons a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }
        .social-icons a:hover {
            color: lightgray;
        }
    </style>
</head>
<body>
    <header>
        <div class="left-content">
            <h1>Ruben Kronborg</h1>
        </div>
        <nav>
            <a href="#home">Hjem</a>
            <a href="#about">Om</a>
            <a href="#projects">Projekter</a>
            <a href="#contact">Kontakt</a>
        </nav>
    </header>
    
    <main>
        <h1>Velkommen</h1>
        <p>Dette er min personlige hjemmeside.</p>
    </main>
    
    <footer>
        <p>&copy; 2024 Ruben Kronborg. Alle rettigheder forbeholdes.</p>
        <div class="social-icons">
            <a href="https://www.facebook.com" target="_blank" aria-label="Facebook">
                <img src="https://img.icons8.com/ios-filled/24/ffffff/facebook.png" alt="Facebook">
            </a>
            <a href="https://www.twitter.com" target="_blank" aria-label="Twitter">
                <img src="https://img.icons8.com/ios-filled/24/ffffff/twitter.png" alt="Twitter">
            </a>
            <a href="https://www.linkedin.com" target="_blank" aria-label="LinkedIn">
                <img src="https://img.icons8.com/ios-filled/24/ffffff/linkedin.png" alt="LinkedIn">
            </a>
            <a href="https://www.instagram.com" target="_blank" aria-label="Instagram">
                <img src="https://img.icons8.com/ios-filled/24/ffffff/instagram-new.png" alt="Instagram">
            </a>
        </div>
    </footer>
</body>
</html>
