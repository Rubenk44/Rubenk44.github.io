    <title>Min Personlige Hjemmeside</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            color: white;
            padding: 10px 20px;
        }
        .left-content h1 {
            margin: 0;
            font-size: 1.5em;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            flex: 1;
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: gray;
            text-align: center;
            padding: 20px;
        }
        .social-icons {
            margin-top: 10px;
        }
        .social-icons a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }
        .social-icons a:hover {
            color: lightgray;
        }
        .social-icons svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
        .attribution {
            margin-top: 10px;
            font-size: 0.8em;
            color: gray;
        }
    </style>
</head>
