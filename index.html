    <title>Min Personlige Hjemmeside</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #fff; /* Hvid baggrund */
            color: #333; /* Sort tekstfarve */
            padding: 10px 20px;
        }
        .left-content h1 {
            margin: 0;
            font-size: 1.5em;
        }
        nav a {
            color: #333; /* Sort tekstfarve */
            margin: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        main {
            flex: 1;
            padding: 20px;
            background-color: #f0f0f0; /* Lysegrå baggrund */
        }
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #000; /* Sort baggrund */
            color: #fff; /* Hvid tekstfarve */
            padding: 10px 20px;
        }
        .social-icons {
            display: flex;
        }
        .social-icons a {
            color: #fff; /* Hvid tekstfarve */
            margin: 0 10px;
            text-decoration: none;
        }
        .social-icons a:hover {
            color: lightgray;
        }
        .social-icons svg {
            width: 24px;
            height: 24px;
            fill: white;
        }
    </style>
